<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المشرف - Winky Kids</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">🔐</div>
                <h1 class="login-title">لوحة تحكم المشرف</h1>
                <p class="login-subtitle">قم بتسجيل الدخول للوصول إلى لوحة التحكم</p>
            </div>

            <div id="error-container"></div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">البريد الإلكتروني</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="admin@example.com"
                        required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">كلمة المرور</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                        required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary login-btn">
                    تسجيل الدخول
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="index.html" style="color: var(--text-secondary); font-size: 0.9rem;">
                    ← العودة للصفحة الرئيسية
                </a>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- App Scripts -->
    <script src="js/supabase-init.js"></script>
    <script src="js/auth.js?v=2"></script>

    <!-- Login Script -->
    <script>
        const loginForm = document.getElementById('login-form');
        const errorContainer = document.getElementById('error-container');
        const loadingOverlay = document.getElementById('loading-overlay');

        // Check if already logged in
        supabase.auth.getUser().then(({ data: { user } }) => {
            if (user) {
                window.location.href = 'admin-dashboard.html';
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Clear previous errors
            errorContainer.innerHTML = '';

            // Show loading
            loadingOverlay.style.display = 'flex';

            try {
                const result = await loginAdmin(email, password);

                if (result.success) {
                    // Redirect to dashboard
                    window.location.href = 'admin-dashboard.html';
                } else {
                    // Show error
                    showError(result.error);
                }
            } catch (error) {
                showError('حدث خطأ غير متوقع');
            } finally {
                loadingOverlay.style.display = 'none';
            }
        });

        function showError(message) {
            errorContainer.innerHTML = `
                <div class="error-alert">
                    ${message}
                </div>
            `;
        }
    </script>
</body>

</html>
